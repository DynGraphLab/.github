<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1328"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="60" ry="60" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.04" fill="white">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/><circle cx="350" cy="50" r="2"/><circle cx="400" cy="50" r="2"/><circle cx="450" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="350" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="450" cy="100" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/><circle cx="250" cy="150" r="2"/><circle cx="300" cy="150" r="2"/><circle cx="350" cy="150" r="2"/><circle cx="400" cy="150" r="2"/><circle cx="450" cy="150" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="250" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="350" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="450" cy="200" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="100" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="200" cy="250" r="2"/><circle cx="250" cy="250" r="2"/><circle cx="300" cy="250" r="2"/><circle cx="350" cy="250" r="2"/><circle cx="400" cy="250" r="2"/><circle cx="450" cy="250" r="2"/>
    <circle cx="50" cy="300" r="2"/><circle cx="100" cy="300" r="2"/><circle cx="150" cy="300" r="2"/><circle cx="200" cy="300" r="2"/><circle cx="250" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="350" cy="300" r="2"/><circle cx="400" cy="300" r="2"/><circle cx="450" cy="300" r="2"/>
    <circle cx="50" cy="350" r="2"/><circle cx="100" cy="350" r="2"/><circle cx="150" cy="350" r="2"/><circle cx="200" cy="350" r="2"/><circle cx="250" cy="350" r="2"/><circle cx="300" cy="350" r="2"/><circle cx="350" cy="350" r="2"/><circle cx="400" cy="350" r="2"/><circle cx="450" cy="350" r="2"/>
    <circle cx="50" cy="400" r="2"/><circle cx="100" cy="400" r="2"/><circle cx="150" cy="400" r="2"/><circle cx="200" cy="400" r="2"/><circle cx="250" cy="400" r="2"/><circle cx="300" cy="400" r="2"/><circle cx="350" cy="400" r="2"/><circle cx="400" cy="400" r="2"/><circle cx="450" cy="400" r="2"/>
    <circle cx="50" cy="450" r="2"/><circle cx="100" cy="450" r="2"/><circle cx="150" cy="450" r="2"/><circle cx="200" cy="450" r="2"/><circle cx="250" cy="450" r="2"/><circle cx="300" cy="450" r="2"/><circle cx="350" cy="450" r="2"/><circle cx="400" cy="450" r="2"/><circle cx="450" cy="450" r="2"/>
  </g>

  <!-- ============ GRAPH ============ -->
  <!-- Node positions:
    A: 140, 120
    B: 300, 90
    C: 400, 180
    D: 360, 320
    E: 200, 350
    F: 100, 250
    G: 250, 210 (center)
  -->

  <!-- Stable edges -->
  <g stroke="#4a6fa5" stroke-width="3.5" opacity="0.7">
    <line x1="140" y1="120" x2="300" y2="90"/>
    <line x1="300" y1="90" x2="400" y2="180"/>
    <line x1="400" y1="180" x2="360" y2="320"/>
    <line x1="360" y1="320" x2="200" y2="350"/>
    <line x1="200" y1="350" x2="100" y2="250"/>
    <line x1="100" y1="250" x2="140" y2="120"/>
    <line x1="140" y1="120" x2="250" y2="210"/>
    <line x1="300" y1="90" x2="250" y2="210"/>
    <line x1="400" y1="180" x2="250" y2="210"/>
    <line x1="200" y1="350" x2="250" y2="210"/>
  </g>

  <!-- Inserted edge (green) -->
  <g stroke="#4ade80" stroke-width="4" opacity="0.9" filter="url(#softglow)">
    <line x1="100" y1="250" x2="250" y2="210"/>
    <line x1="360" y1="320" x2="250" y2="210"/>
  </g>

  <!-- Deleted edge (red dashed) -->
  <g stroke="#f87171" stroke-width="3.5" stroke-dasharray="10,7" opacity="0.8">
    <line x1="100" y1="250" x2="360" y2="320"/>
    <line x1="140" y1="120" x2="400" y2="180"/>
  </g>

  <!-- + symbols -->
  <g font-family="monospace" font-size="26" font-weight="bold" fill="#4ade80" filter="url(#softglow)">
    <text x="155" y="240">+</text>
    <text x="298" y="280">+</text>
  </g>

  <!-- - symbols -->
  <g font-family="monospace" font-size="26" font-weight="bold" fill="#f87171">
    <text x="220" y="302">&#x2212;</text>
    <text x="260" y="148">&#x2212;</text>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="140" cy="120" r="16" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="300" cy="90" r="16" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="400" cy="180" r="16" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="360" cy="320" r="16" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="200" cy="350" r="16" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="100" cy="250" r="16" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
    <circle cx="250" cy="210" r="18" fill="#60a5fa" stroke="#93c5fd" stroke-width="2.5"/>
  </g>

  <!-- Text at bottom -->
  <text x="250" y="448" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle" letter-spacing="-0.5">
    <tspan fill="#60a5fa">Dyn</tspan><tspan fill="#e2e8f0">Graph</tspan><tspan fill="#60a5fa">Lab</tspan>
  </text>

</svg>
