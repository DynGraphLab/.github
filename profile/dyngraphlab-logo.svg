<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1328"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.05" fill="white">
    <circle cx="30" cy="30" r="1"/><circle cx="60" cy="30" r="1"/><circle cx="90" cy="30" r="1"/><circle cx="120" cy="30" r="1"/><circle cx="150" cy="30" r="1"/><circle cx="180" cy="30" r="1"/><circle cx="210" cy="30" r="1"/><circle cx="240" cy="30" r="1"/><circle cx="270" cy="30" r="1"/><circle cx="300" cy="30" r="1"/><circle cx="330" cy="30" r="1"/>
    <circle cx="30" cy="60" r="1"/><circle cx="60" cy="60" r="1"/><circle cx="90" cy="60" r="1"/><circle cx="120" cy="60" r="1"/><circle cx="150" cy="60" r="1"/><circle cx="180" cy="60" r="1"/><circle cx="210" cy="60" r="1"/><circle cx="240" cy="60" r="1"/><circle cx="270" cy="60" r="1"/><circle cx="300" cy="60" r="1"/><circle cx="330" cy="60" r="1"/>
    <circle cx="30" cy="90" r="1"/><circle cx="60" cy="90" r="1"/><circle cx="90" cy="90" r="1"/><circle cx="120" cy="90" r="1"/><circle cx="150" cy="90" r="1"/><circle cx="180" cy="90" r="1"/><circle cx="210" cy="90" r="1"/><circle cx="240" cy="90" r="1"/><circle cx="270" cy="90" r="1"/><circle cx="300" cy="90" r="1"/><circle cx="330" cy="90" r="1"/>
    <circle cx="30" cy="120" r="1"/><circle cx="60" cy="120" r="1"/><circle cx="90" cy="120" r="1"/><circle cx="120" cy="120" r="1"/><circle cx="150" cy="120" r="1"/><circle cx="180" cy="120" r="1"/><circle cx="210" cy="120" r="1"/><circle cx="240" cy="120" r="1"/><circle cx="270" cy="120" r="1"/><circle cx="300" cy="120" r="1"/><circle cx="330" cy="120" r="1"/>
    <circle cx="30" cy="150" r="1"/><circle cx="60" cy="150" r="1"/><circle cx="90" cy="150" r="1"/><circle cx="120" cy="150" r="1"/><circle cx="150" cy="150" r="1"/><circle cx="180" cy="150" r="1"/><circle cx="210" cy="150" r="1"/><circle cx="240" cy="150" r="1"/><circle cx="270" cy="150" r="1"/><circle cx="300" cy="150" r="1"/><circle cx="330" cy="150" r="1"/>
    <circle cx="30" cy="180" r="1"/><circle cx="60" cy="180" r="1"/><circle cx="90" cy="180" r="1"/><circle cx="120" cy="180" r="1"/><circle cx="150" cy="180" r="1"/><circle cx="180" cy="180" r="1"/><circle cx="210" cy="180" r="1"/><circle cx="240" cy="180" r="1"/><circle cx="270" cy="180" r="1"/><circle cx="300" cy="180" r="1"/><circle cx="330" cy="180" r="1"/>
    <circle cx="30" cy="210" r="1"/><circle cx="60" cy="210" r="1"/><circle cx="90" cy="210" r="1"/><circle cx="120" cy="210" r="1"/><circle cx="150" cy="210" r="1"/><circle cx="180" cy="210" r="1"/><circle cx="210" cy="210" r="1"/><circle cx="240" cy="210" r="1"/><circle cx="270" cy="210" r="1"/><circle cx="300" cy="210" r="1"/><circle cx="330" cy="210" r="1"/>
  </g>

  <!-- ============ GRAPH VISUALIZATION (left side) ============ -->

  <!-- Stable edges (solid, light blue-gray) -->
  <g stroke="#4a6fa5" stroke-width="2" opacity="0.7">
    <line x1="80" y1="70" x2="160" y2="55"/>
    <line x1="80" y1="70" x2="120" y2="140"/>
    <line x1="160" y1="55" x2="230" y2="80"/>
    <line x1="160" y1="55" x2="120" y2="140"/>
    <line x1="120" y1="140" x2="200" y2="160"/>
    <line x1="230" y1="80" x2="280" y2="140"/>
    <line x1="230" y1="80" x2="200" y2="160"/>
    <line x1="200" y1="160" x2="280" y2="140"/>
    <line x1="280" y1="140" x2="310" y2="195"/>
    <line x1="200" y1="160" x2="150" y2="205"/>
  </g>

  <!-- Inserted edges (green, with + marker) -->
  <g stroke="#4ade80" stroke-width="2.5" opacity="0.9" filter="url(#softglow)">
    <line x1="80" y1="70" x2="55" y2="160"/>
    <line x1="230" y1="80" x2="330" y2="65"/>
  </g>
  <!-- + symbols for insertions -->
  <g font-family="monospace" font-size="14" font-weight="bold" fill="#4ade80" filter="url(#softglow)">
    <text x="52" y="112">+</text>
    <text x="278" y="62">+</text>
  </g>

  <!-- Deleted edges (red, dashed) -->
  <g stroke="#f87171" stroke-width="2" stroke-dasharray="6,4" opacity="0.8">
    <line x1="120" y1="140" x2="55" y2="160"/>
    <line x1="310" y1="195" x2="330" y2="65"/>
  </g>
  <!-- x symbols for deletions -->
  <g font-family="monospace" font-size="11" font-weight="bold" fill="#f87171">
    <text x="76" y="156" transform="rotate(-10, 76, 156)">&#x2013;</text>
    <text x="330" y="135" transform="rotate(-10, 330, 135)">&#x2013;</text>
  </g>

  <!-- Graph nodes -->
  <!-- Main nodes (blue-white) -->
  <g filter="url(#glow)">
    <circle cx="80" cy="70" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="160" cy="55" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="120" cy="140" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="230" cy="80" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="200" cy="160" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="280" cy="140" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="150" cy="205" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="310" cy="195" r="9" fill="#60a5fa" stroke="#93c5fd" stroke-width="1.5"/>
  </g>
  <!-- Newly inserted nodes (green accent) -->
  <g filter="url(#glow)">
    <circle cx="55" cy="160" r="8" fill="#4ade80" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="330" cy="65" r="8" fill="#4ade80" stroke="#86efac" stroke-width="1.5"/>
  </g>

  <!-- Time arrow at bottom -->
  <g opacity="0.35">
    <line x1="60" y1="235" x2="330" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
      </marker>
    </defs>
    <text x="180" y="232" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-style="italic">time</text>
  </g>

  <!-- ============ TEXT (right side) ============ -->

  <!-- Title -->
  <text x="460" y="105" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1">
    <tspan fill="#60a5fa">Dyn</tspan><tspan fill="#e2e8f0">Graph</tspan><tspan fill="#60a5fa">Lab</tspan>
  </text>

  <!-- Subtitle -->
  <text x="462" y="140" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#94a3b8" font-style="italic" letter-spacing="0.5">
    Dynamic Graph Algorithms
  </text>

  <!-- Legend -->
  <g transform="translate(462, 175)">
    <!-- Stable -->
    <line x1="0" y1="0" x2="22" y2="0" stroke="#4a6fa5" stroke-width="2"/>
    <circle cx="11" cy="0" r="5" fill="#60a5fa" stroke="#93c5fd" stroke-width="1"/>
    <text x="30" y="4" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8">Stable edges</text>

    <!-- Inserted -->
    <line x1="155" y1="0" x2="177" y2="0" stroke="#4ade80" stroke-width="2"/>
    <text x="185" y="4" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8">Insertions</text>

    <!-- Deleted -->
    <line x1="275" y1="0" x2="297" y2="0" stroke="#f87171" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="305" y="4" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8">Deletions</text>
  </g>

</svg>
